<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tasks Board</title>
    <script>
      // Restore path from GitHub Pages 404 redirect
      (function(l){if(l.search[1]=='/'){var d=l.search.slice(1).split('&').map(function(x){return x.replace(/~and~/g,'&')});history.replaceState(null,null,l.pathname.slice(0,-1)+(d[0]?'/'+d[0]:'')+(d[1]?'?'+d[1]:'')+l.hash)}}(window.location))
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
